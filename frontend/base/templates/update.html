{% extends 'main.html' %}

{% block content %}

<div class="form-container">

    <div class="form-card">

        <h1>Update Task</h1>

        <form action="" method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Title</label>
                <input
                    type="text"
                    name="title"
                    value="{{data.title}}"
                    required
                >
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea
                    name="desc"
                    rows="4"
                    required
                >{{data.desc}}</textarea>
            </div>

            <button type="submit" class="submit-btn">
                Update Task
            </button>

        </form>

    </div>

</div>

{% endblock %}
